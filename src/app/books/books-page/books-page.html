<main class="page-content">
  <section class="search-section" aria-label="Book search">
    <app-book-search
      [isLoading]="store.isLoading()"
      (searched)="onSearch($event)"
      (cleared)="onCleared()"
    />
  </section>

  <mat-divider />

  <section class="results-section" aria-label="Search results">
    @if (store.hasBooks()) {
      <p class="results-count" aria-live="polite" aria-atomic="true">
        Showing <strong>{{ store.loadedCount() }}</strong> of
        <strong>{{ store.totalFound() }}</strong> results
        @if (store.searchParams().q) {
          for "<em>{{ store.searchParams().q }}</em>"
        }
      </p>
    }

    <app-book-list
      [books]="store.filteredBooks()"
      [isLoading]="store.isLoading()"
      (bookSelected)="onBookSelected($event)"
      (bookDeleted)="onBookDeleted($event)"
    />

    @if (store.hasMore()) {
      <div class="pagination-actions">
        <button
          mat-stroked-button
          type="button"
          [disabled]="store.isLoading()"
          aria-label="Load more books"
        >
          Load more
        </button>
        <span class="page-meta">Page {{ store.currentPage() }} of {{ store.totalPages() }}</span>
      </div>
    }
  </section>
</main>
